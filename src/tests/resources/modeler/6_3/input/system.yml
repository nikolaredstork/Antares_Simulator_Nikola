system:
  id: sys_example_6_3
  description: >
    test system with 4 components : one balance node, one load (100 MW), two components of generators with fixed cost (with Pmax_1 = 80 MW and Pmax_2 = 200 MW). Two time steps.
    t=0 : gen1_prop_cost = 0.5 €/MW, gen1_fixed_cost = 5 €, gen2_prop_cost = 6 €/MW, gen2_fixed_cost = 0 €
    t = 1 : gen1_prop_cost = 0.5 €/MW, gen1_fixed_cost = 1000 €, gen2_prop_cost = 6 €/MW, gen2_fixed_cost = 0 €
    
    Solutions
    t = 0, gen1_p = 80, gen2_p = 20, on_off_gen1_p = 1
    t = 1, gen1_p = 0, gen2_p = 100, on_off_gen1_p = 0
    
    Objective function : 765

  model-libraries: lib_example_6_3


  components:
    - id: N
      model: lib_example_6_3.balance_node


    - id: NG1
      model: lib_example_6_3.generator_with_fixed_cost

      parameters:
        - id: gen_max_p
          time-dependent: false
          scenario-dependent: false
          value: 80
        - id: gen_prop_cost
          time-dependent: false
          scenario-dependent: false
          value: 0.5
        - id: gen_fixed_cost
          time-dependent: true
          scenario-dependent: false
          value: gen_1_fixed_cost_6_3

    - id: NG2
      model: lib_example_6_3.generator_with_fixed_cost

      parameters:
        - id: gen_max_p
          time-dependent: false
          scenario-dependent: false
          value: 200
        - id: gen_prop_cost
          time-dependent: false
          scenario-dependent: false
          value: 6.0
        - id: gen_fixed_cost
          time-dependent: true
          scenario-dependent: false
          value: gen_2_fixed_cost_6_3



    - id: NL
      model: lib_example_6_3.node_load

      parameters:
        - id: load
          time-dependent: false
          scenario-dependent: false
          value: 100.0

  connections:
    - component1: N
      port1: injection_port
      component2: NL
      port2: injection_port

    - component1: N
      port1: injection_port
      component2: NG1
      port2: injection_port

    - component1: N
      port1: injection_port
      component2: NG2
      port2: injection_port
