library:
  id: lib_example_6_3
  description: test model library

  port-types:
    - id:  power_flow
      description: power flow
      fields:
        - id: flow
  
  models:
    - id: balance_node
      description: A basic balancing node model
      ports:
        - id: injection_port
          type: power_flow
      binding-constraints:
        - id: balance
          expression:  sum_connections(injection_port.flow) = 0

    - id: generator_with_fixed_cost
      description: One simple generator with fixed (start-up) cost
      parameters:
        - id: gen_max_p
          time-dependent: false
          scenario-dependent: false
        - id: gen_prop_cost
          time-dependent: false
          scenario-dependent: false
        - id: gen_fixed_cost
          time-dependent: true
          scenario-dependent: false
  
      variables:
        - id: gen
          lower-bound: 0
          upper-bound: gen_max_p
          variable-type: continuous
        - id: on_off_gen
          variable-type: boolean
        
      constraints:
        - id: switch_gen_1
          expression : gen <= gen_max_p * on_off_gen
      ports:
        - id: injection_port
          type: power_flow
      port-field-definitions:
        - port: injection_port
          field: flow
          definition: gen
      objective: sum(gen_fixed_cost * on_off_gen+ gen * gen_prop_cost)

    - id: node_load
      description: A simple node with one load 
      parameters:
       - id: load
         time-dependent: false
         scenario-dependent: false
      ports:
        - id: injection_port
          type: power_flow
      port-field-definitions:
        - port: injection_port
          field: flow
          definition: -load 
      

